<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthPulse AI | Disease Prediction</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>HealthPulse AI</h1>
            <p>Predictive disease analysis using state-of-the-art machine learning models.</p>
        </header>

        <div class="grid">
            <div class="card input-section">
                <h2>Patient Data</h2>
                <label for="disease-select">Target Disease</label>
                <select id="disease-select" class="select-disease">
                    <option value="heart_disease">Heart Disease</option>
                    <option value="diabetes">Diabetes</option>
                    <option value="breast_cancer">Breast Cancer</option>
                </select>

                <div id="dynamic-form">
                    <!-- Dynamic fields will be injected here -->
                </div>

                <button id="predict-btn" class="btn-predict">Analyze Risk</button>
            </div>

            <div class="results-container">
                <div class="card analysis-card">
                    <h3>📈 Model Performance (Trained Data)</h3>
                    <div id="performance-chart" style="height: 250px;"></div>
                </div>

                <div id="initial-message" class="card summary-card">
                    <div class="summary-icon">🏥</div>
                    <h3>Ready for Analysis</h3>
                    <p>Enter patient data to see multi-model risk assessment.</p>
                </div>

                <div id="results-display" style="display: none;">
                    <div class="card summary-card animate-fade">
                        <div id="overall-icon" class="summary-icon">⚠️</div>
                        <h2 id="overall-status">Analysis Complete</h2>
                        <p id="overall-desc">Multi-algorithm consensus results.</p>
                    </div>

                    <div class="stats-grid" id="algo-results">
                        <!-- Algorithm results injected here -->
                    </div>

                    <div class="card chart-container">
                        <div id="probability-chart"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
